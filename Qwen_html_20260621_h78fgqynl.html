<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Starter Kit</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --emerald: #059669; /* Deep Emerald */
            --gold: #d4af37;   /* Gold Accent */
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: var(--card-bg);
            padding: 1rem 2rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 700; font-size: 1.5rem; }
        .gold { color: var(--gold); }

        nav button {
            background: none;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            transition: 0.3s;
        }

        nav button.active { color: var(--emerald); border-bottom: 2px solid var(--emerald); }

        main { flex: 1; padding: 2rem; max-width: 800px; margin: 0 auto; width: 100%; }

        .hidden-section { display: none; }

        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
        }

        input:focus { border-color: var(--emerald); }

        .btn-primary {
            background-color: var(--emerald);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-secondary {
            background-color: var(--gold);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .result-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--gold);
        }

        .disclaimer { font-size: 0.8rem; color: #94a3b8; margin-top: 20px; }

        footer { text-align: center; padding: 1rem; font-size: 0.9rem; color: #64748b; }
        
        ul { list-style-type: none; padding: 0; }
        li { background: var(--card-bg); margin: 5px 0; padding: 10px; border-radius: 5px; box-shadow: var(--shadow); }
    </style>
</head>
<body>
    <header>
        <div class="logo">OSINT<span class="gold">Kit</span></div>
        <nav>
            <button class="tab-btn active" onclick="switchTab('checker', this)">Username Checker</button>
            <button class="tab-btn" onclick="switchTab('checklist', this)">Checklist Gen</button>
        </nav>
    </header>

    <main>
        <!-- Вкладка 1: Проверка юзернеймов -->
        <section id="checker">
            <h2>Проверка доступности Username</h2>
            <div class="input-group">
                <input type="text" id="usernameInput" placeholder="Введите никнейм (например, user123)">
                <button onclick="checkUsername()" class="btn-primary">Проверить</button>
            </div>
            <div id="results" class="results-grid"></div>
            <p class="disclaimer">* Проверяются только открытые API. Остальные — прямые ссылки для ручной проверки.</p>
        </section>

        <!-- Вкладка 2: Генератор чеклистов -->
        <section id="checklist" class="hidden-section">
            <h2>Генератор OSINT Чеклиста</h2>
            <div class="filters">
                <label><input type="checkbox" value="person" checked> Человек</label>
                <label><input type="checkbox" value="company" checked> Компания</label>
                <label><input type="checkbox" value="geo" checked> Геолокация</label>
            </div>
            <button onclick="generateChecklist()" class="btn-secondary">Сформировать список</button>
            <ul id="checklist-output"></ul>
        </section>
    </main>

    <footer>
        <p>Tool uses only publicly available data. No private information is stored.</p>
    </footer>

    <script>
        function switchTab(tabId, btn) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById(tabId).classList.remove('hidden-section');
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function checkUsername() {
            const username = document.getElementById('usernameInput').value;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if (!username) return alert('Введите имя!');

            const platforms = [
                { name: 'GitHub', url: `https://github.com/${username}` },
                { name: 'Keybase', url: `https://keybase.io/${username}` },
                { name: 'Reddit', url: `https://www.reddit.com/user/${username}` },
                { name: 'Twitter/X', url: `https://twitter.com/${username}` },
                { name: 'Instagram', url: `https://instagram.com/${username}` }
            ];

            platforms.forEach(p => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `<strong>${p.name}</strong><br><a href="${p.url}" target="_blank" style="color:var(--emerald)">Открыть профиль</a>`;
                resultsDiv.appendChild(card);
            });
        }

        function generateChecklist() {
            const output = document.getElementById('checklist-output');
            output.innerHTML = '<li>🔍 Поиск по email (HaveIBeenPwned)</li><li>📸 Анализ аватарок (PimEyes)</li><li>🌍 Поиск по геоданным (GeoGuessr tools)</li>';
        }
    </script>
</body>
</html>
