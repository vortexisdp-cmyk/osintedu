<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Dashboard</title>
    <style>
        :root {
            --bg-dark: #022c22; /* Very Deep Emerald */
            --sidebar-bg: #064e3b; /* Dark Emerald */
            --card-bg: #ffffff;
            --text-main: #f1f5f9;
            --emerald-accent: #059669;
            --gold: #d4af37;
            --gold-hover: #b5952f;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Боковая колонка (Sidebar) */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            padding: 2rem;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--gold);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 2rem;
            text-align: center;
            border-bottom: 1px solid var(--emerald-accent);
            padding-bottom: 1rem;
        }

        .nav-links { list-style: none; padding: 0; }
        .nav-item {
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            color: #a7f3d0;
            font-weight: 500;
        }
        .nav-item:hover, .nav-item.active {
            background-color: var(--emerald-accent);
            color: white;
            border-left: 4px solid var(--gold);
        }

        .external-links { margin-top: auto; padding-top: 2rem; border-top: 1px solid #065f46; }
        .ext-link {
            display: block;
            color: var(--gold);
            text-decoration: none;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .ext-link:hover { text-decoration: underline; }

        /* Основной контент */
        main { flex: 1; padding: 2rem; overflow-y: auto; }
        
        .section-title {
            color: var(--gold);
            border-bottom: 2px solid var(--emerald-accent);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .hidden-section { display: none; }

        .input-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input, select {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--emerald-accent);
            background: #ecfdf5;
            border-radius: 8px;
            outline: none;
            color: var(--bg-dark);
        }

        .btn-primary {
            background-color: var(--gold);
            color: var(--bg-dark);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn-primary:hover { background-color: var(--gold-hover); }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .result-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--emerald-accent);
            color: var(--bg-dark);
        }
        .result-card a { color: var(--emerald-accent); font-weight: 600; }

        ul { list-style-type: none; padding: 0; }
        li {
            background: var(--card-bg);
            margin: 8px 0;
            padding: 12px;
            border-radius: 8px;
            color: var(--bg-dark);
            display: flex;
            justify-content: space-between;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>

    <!-- Левая колонка -->

        <div class="logo">OSINT<span style="color:white">Kit</span></div>
        
        <ul class="nav-links">
            <li class="nav-item active" onclick="switchTab('checker')">🔍 Username Check</li>
            <li class="nav-item" onclick="switchTab('domain')">🌐 Domain Info</li>
            <li class="nav-item" onclick="switchTab('email')">📧 Email Gen</li>
            <li class="nav-item" onclick="switchTab('checklist')">✅ Checklists</li>
        </ul>

        <div class="external-links">
            <h4 style="color: var(--gold)">Корисні посилання:</h4>
            <a href="https://osintframework.com/" target="_blank" class="ext-link">OSINT Framework</a>
            <a href="https://haveibeenpwned.com/" target="_blank" class="ext-link">Have I Been Pwned</a>
            <a href="https://www.virustotal.com/" target="_blank" class="ext-link">VirusTotal</a>
        </div>
        
        <select class="lang-select" onchange="changeLanguage(this.value)" style="margin-top: 20px; width: 100%;">
            <option value="uk">🇺🇦 UA</option>
            <option value="ru">🇷🇺 RU</option>
            <option value="en">🇬🇧 EN</option>
            <option value="pt">🇧🇷 PT</option>
        </select>
    </aside>
